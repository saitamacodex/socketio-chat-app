<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Chat Room <span id="room-id"></span></h1>

    <input id="username" placeholder="Enter username" />
    <input id="room" placeholder="Enter room no" type="number" />
    <button id="join">Join</button>
    <br /><br />

    <label>Enter Your Message:</label>
    <input type="text" id="msg" placeholder="Enter message" />
    <button id="btn">Send</button>

    <hr />
    <div id="container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const container = document.getElementById("container");
      const sendBtn = document.getElementById("btn");
      const msg = document.getElementById("msg");

      const usernameInput = document.getElementById("username");
      const roomInput = document.getElementById("room");
      const joinBtn = document.getElementById("join");

      let username = "";
      let roomId = "";
      joinBtn.addEventListener("click", function (event) {
        username = usernameInput.value.trim();
        roomId = roomInput.value.trim();

        if (!username || !roomId) {
          alert("Uername and room id are required.");
          return;
        }
        // once joined the room diable or clear the field
        usernameInput.disabled = true;
        roomInput.disabled = true;
        joinBtn.disabled = true;

        // update UI
        document.getElementById("room-id").textContent =
          roomId + " " + username;

        // send room id / username to server
        socket.emit("join-room", { roomId, username });
      });

      function sendMessage() {
        if (!username || !roomId) {
          alert("Please join a room first");
          return;
        }
        if (msg.value) {
          socket.emit("client-send-msg", {
            roomId,
            message: msg.value,
          });
        }
        msg.value = "";
      }

      // get message from server
      socket.on("server-recieve-msg", (data) => {
        const li = document.createElement("li");
        const name = data.username === username ? "You" : data.username;
        li.textContent = `${name} : ${data.message}`;
        container.appendChild(li);
      });

      // send msg btn
      sendBtn.addEventListener("click", function (e) {
        sendMessage();
      });
    </script>
  </body>
</html>
