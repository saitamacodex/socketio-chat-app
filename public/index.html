<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Chat Room <span id="room-id"></span></h1>

    <label>EnterMessage:</label>
    <input type="text" id="msg" placeholder="Enter message" />
    <button id="btn">Send</button>

    <hr />
    <div id="container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const container = document.getElementById("container");
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");

      // get the room id from the user
      const username = prompt("Enter your firstname; ");
      const roomId = prompt("Enter room id: ");
      document.getElementById("room-id").textContent = roomId + " " + username;

      // send room id to server
      socket.emit("join-room", roomId);

      function sendMessage() {
        if (msg.value) {
          socket.emit("client-send-msg", {
            roomId,
            message: msg.value,
          });
        }
        msg.value = "";
      }

      // lister from server
      socket.on("server-recieve-msg", (data) => {
        const li = document.createElement("li");
        li.textContent = `${data.sender} : ${data.message}`;
        container.appendChild(li);
      });

      btn.addEventListener("click", function (e) {
        sendMessage();
      });
    </script>
  </body>
</html>
